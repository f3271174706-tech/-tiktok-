<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抖音/TikTok 无水印下载</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; }

:root {
  --glass-bg: rgba(255,255,255,0.06);
  --glass-border: rgba(255,255,255,0.10);
  --glass-highlight: rgba(255,255,255,0.04);
  --glow-1: rgba(139,92,246,0.3);
  --glow-2: rgba(59,130,246,0.2);
  --glow-3: rgba(236,72,153,0.15);
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  margin: 0;
  background: #0a0a0f;
  color: #e5e7eb;
  overflow: hidden;
  height: 100vh;
}

/* Dynamic gradient background */
.bg-orb {
  position: fixed; border-radius: 50%; filter: blur(120px); opacity: 0.4;
  pointer-events: none; z-index: 0;
}
.bg-orb-1 { width: 600px; height: 600px; background: var(--glow-1); top: -200px; left: -100px; animation: orb1 20s ease-in-out infinite; }
.bg-orb-2 { width: 500px; height: 500px; background: var(--glow-2); bottom: -150px; right: -150px; animation: orb2 25s ease-in-out infinite; }
.bg-orb-3 { width: 400px; height: 400px; background: var(--glow-3); top: 50%; left: 50%; animation: orb3 18s ease-in-out infinite; }
@keyframes orb1 { 0%,100% { transform: translate(0,0); } 33% { transform: translate(100px,80px); } 66% { transform: translate(-50px,120px); } }
@keyframes orb2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-120px,-60px); } }
@keyframes orb3 { 0%,100% { transform: translate(-50%,-50%); } 50% { transform: translate(-30%,-70%); } }

/* Glass panel base */
.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.06);
}

.glass-input {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.glass-input:focus {
  border-color: rgba(139,92,246,0.5);
  box-shadow: 0 0 0 3px rgba(139,92,246,0.1), 0 4px 16px rgba(0,0,0,0.2);
}

.glass-btn {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.1);
  color: #9ca3af;
  will-change: transform;
}
.glass-btn:hover { background: rgba(255,255,255,0.1); color: #d1d5db; }

.glass-btn-active {
  background: rgba(139,92,246,0.15) !important;
  border-color: rgba(139,92,246,0.35) !important;
  color: #a78bfa !important;
}

.btn-primary {
  background: linear-gradient(135deg, #7c3aed, #6366f1);
  border: none;
  color: #fff;
  box-shadow: 0 4px 16px rgba(99,102,241,0.3);
  will-change: transform;
}
.btn-primary:hover { box-shadow: 0 6px 24px rgba(99,102,241,0.4); }
.btn-primary:disabled { opacity: 0.4; box-shadow: none; }

.btn-download {
  background: linear-gradient(135deg, #059669, #10b981);
  border: none;
  color: #fff;
  box-shadow: 0 4px 16px rgba(16,185,129,0.3);
  will-change: transform;
}
.btn-download:hover { box-shadow: 0 6px 24px rgba(16,185,129,0.4); }
.btn-download:disabled { opacity: 0.4; box-shadow: none; }

.spinner {
  border: 2px solid rgba(255,255,255,0.15);
  border-top: 2px solid #a78bfa;
  border-radius: 50%;
  width: 20px; height: 20px;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.toast {
  background: rgba(30,30,40,0.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
</style>
</head>
<body>

<!-- Ambient background orbs -->
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-orb bg-orb-3"></div>

<div class="relative z-10 flex flex-col h-screen">

  <!-- Top bar -->
  <header class="shrink-0 glass border-b border-white/5 px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2.5">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-violet-500 to-indigo-600 flex items-center justify-center shadow-lg shadow-violet-500/20">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z"/>
        </svg>
      </div>
      <div>
        <h1 class="text-sm font-semibold text-gray-200">无水印下载</h1>
        <p class="text-xs text-gray-500">抖音 · TikTok</p>
      </div>
    </div>
    <span class="text-xs text-gray-500">仅供学习交流</span>
  </header>

  <!-- Input bar -->
  <div class="shrink-0 glass border-b border-white/5 px-4 lg:px-6 py-3">
    <div class="flex gap-2 max-w-3xl mx-auto">
      <input id="urlInput" type="text" placeholder="粘贴视频/图文分享链接..." autocomplete="off"
        class="flex-1 glass-input rounded-xl px-4 py-2.5 text-sm text-gray-200 placeholder-gray-500 outline-none transition-all">
      <button id="pasteBtn" onclick="pasteAndParse()" data-spring
        class="shrink-0 glass-btn font-medium px-3 py-2.5 rounded-xl text-sm flex items-center gap-1.5">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
        <span class="hidden sm:inline">粘贴</span>
      </button>
      <button id="parseBtn" onclick="parseVideo()" data-spring
        class="shrink-0 btn-primary font-medium px-4 py-2.5 rounded-xl text-sm flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
        <svg id="btnIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <span id="btnText">解析</span>
        <div id="btnSpinner" class="spinner hidden"></div>
      </button>
    </div>
  </div>

  <!-- Main content -->
  <div class="flex-1 flex flex-col lg:flex-row min-h-0">

    <!-- Preview area -->
    <div class="flex-1 flex flex-col items-center justify-center p-4 min-h-0 order-1 lg:order-2">
      <div id="previewPlaceholder" class="text-center mb-3">
        <p class="text-xs text-gray-500">视频/图片预览将显示在这里</p>
      </div>
      <div id="videoContainer" class="w-full max-w-3xl">
        <div id="videoLoading" class="hidden text-center mb-2">
          <p class="text-xs text-gray-500">视频加载中，时长较久请耐心等待...</p>
        </div>
        <div class="rounded-xl overflow-hidden shadow-2xl shadow-black/40 bg-black/80 ring-1 ring-white/5">
          <video id="videoPlayer" controls playsinline class="w-full aspect-video object-contain bg-black"></video>
        </div>
      </div>
      <div id="photoContainer" class="hidden w-full max-w-3xl">
        <div class="rounded-xl overflow-hidden shadow-2xl shadow-black/40 ring-1 ring-white/5">
          <img id="photoDisplay" src="" alt="" class="w-full object-contain max-h-[50vh] lg:max-h-[70vh] mx-auto">
        </div>
        <div class="flex items-center justify-between mt-3 px-1">
          <div id="photoCounter" class="flex items-center gap-2"></div>
          <span class="text-xs text-gray-500 hidden sm:inline">点击下方按钮保存当前图片</span>
        </div>
      </div>
    </div>

    <!-- Control panel -->
    <div class="lg:w-[380px] shrink-0 glass border-t lg:border-t-0 lg:border-r border-white/5 flex flex-col order-2 lg:order-1">
      <div class="p-4 lg:p-5 flex flex-col gap-3 lg:gap-4 flex-1 overflow-y-auto">

        <div id="resultCard" class="hidden flex flex-col gap-3 lg:gap-4 flex-1">

          <div>
            <span id="platform" class="inline-block text-xs font-medium text-violet-400 bg-violet-500/10 px-2 py-0.5 rounded-md mb-1.5"></span>
            <h3 id="videoTitle" class="text-sm font-medium text-gray-200 line-clamp-2"></h3>
            <span id="duration" class="text-xs text-gray-500 mt-0.5"></span>
          </div>

          <div class="flex flex-col sm:flex-row gap-3 lg:flex-col lg:gap-4">
            <div id="qualitySelector" class="flex-1">
              <label class="text-xs font-medium text-gray-500 mb-1.5 block">画质</label>
              <div class="flex gap-1.5">
                <button onclick="setQuality('720p')" data-q="720p" data-spring class="quality-btn flex-1 glass-btn text-xs py-2 rounded-lg">720p</button>
                <button onclick="setQuality('1080p')" data-q="1080p" data-spring class="quality-btn flex-1 glass-btn text-xs py-2 rounded-lg">1080p</button>
                <button onclick="setQuality('hd')" data-q="hd" data-spring class="quality-btn flex-1 glass-btn text-xs py-2 rounded-lg">HD</button>
              </div>
            </div>

            <div id="typeSelector" class="flex-1">
              <label class="text-xs font-medium text-gray-500 mb-1.5 block">格式</label>
              <div class="flex gap-2">
                <button onclick="setType('video')" data-t="video" data-spring class="type-btn flex-1 glass-btn text-xs py-2 rounded-lg">
                  <span class="flex items-center justify-center gap-1"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>视频</span>
                </button>
                <button onclick="setType('mp3')" data-t="mp3" data-spring class="type-btn flex-1 glass-btn text-xs py-2 rounded-lg">
                  <span class="flex items-center justify-center gap-1"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/></svg>MP3</span>
                </button>
              </div>
            </div>
          </div>

          <button id="downloadBtn" onclick="downloadVideo()" data-spring
            class="w-full btn-download font-medium px-5 py-3 rounded-xl text-sm flex items-center justify-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
            <svg id="downloadIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            <span id="downloadText">下载无水印视频</span>
            <div id="downloadSpinner" class="spinner hidden"></div>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toastContainer" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

<script>
// ═══════════════════════════════════════
// Spring Physics Engine
// ═══════════════════════════════════════
class Spring {
  constructor(target = 1, { tension = 170, friction = 26, mass = 1 } = {}) {
    this._target = target;
    this._value = target;
    this._velocity = 0;
    this._tension = tension;
    this._friction = friction;
    this._mass = mass;
    this._running = false;
    this._onUpdate = null;
  }

  setTarget(t) {
    this._target = t;
    if (!this._running) this._start();
  }

  setValue(v) {
    this._value = v;
    this._velocity = 0;
  }

  onUpdate(fn) { this._onUpdate = fn; return this; }

  _start() {
    if (this._running) return;
    this._running = true;
    const loop = () => {
      const Fspring = (this._target - this._value) * (this._tension / 1000);
      const Fdamper = -this._velocity * (this._friction / 100);
      const accel = (Fspring + Fdamper) / this._mass;
      this._velocity += accel;
      this._value += this._velocity;
      if (this._onUpdate) this._onUpdate(this._value);
      if (Math.abs(this._velocity) < 0.001 && Math.abs(this._target - this._value) < 0.001) {
        this._value = this._target;
        this._velocity = 0;
        this._running = false;
        if (this._onUpdate) this._onUpdate(this._value);
        return;
      }
      requestAnimationFrame(loop);
    };
    requestAnimationFrame(loop);
  }

  get value() { return this._value; }
}

// ═══════════════════════════════════════
// Button spring feedback (press/release)
// ═══════════════════════════════════════
const springButtons = new Map();

function initSpringButton(el) {
  const s = new Spring(1, { tension: 250, friction: 18, mass: 1 });
  s.onUpdate(v => { el.style.transform = `scale(${v})`; });
  el.addEventListener('pointerdown', () => {
    // Stop any existing animation, snap to current
    s.setValue(+(el.style.transform.match(/[\d.]+/) || [1])[0]);
    s.setTarget(0.95);
  });
  el.addEventListener('pointerup', () => { s.setTarget(1.02); setTimeout(() => s.setTarget(1), 100); });
  el.addEventListener('pointerleave', () => { s.setTarget(1); });
  el.addEventListener('pointercancel', () => { s.setTarget(1); });
  springButtons.set(el, s);
}

document.querySelectorAll('[data-spring]').forEach(initSpringButton);

// Observe dynamically shown buttons in resultCard
const resultObserver = new MutationObserver(() => {
  document.querySelectorAll('#resultCard [data-spring]').forEach(el => {
    if (!springButtons.has(el)) initSpringButton(el);
  });
});
resultObserver.observe(document.getElementById('resultCard'), { childList: true, subtree: true, attributes: true });

// ═══════════════════════════════════════
// Application state
// ═══════════════════════════════════════
let currentUrl = '';
let currentQuality = '1080p';
let currentType = 'video';
let currentVideoUrl = '';
let currentContentType = 'video';
let currentImages = [];
let currentPhotoIdx = 0;

async function pasteAndParse() {
  try {
    const text = await navigator.clipboard.readText();
    if (text) {
      document.getElementById('urlInput').value = text;
      parseVideo();
    }
  } catch {
    showToast('无法读取剪贴板，请手动粘贴', 'error');
  }
}

function setType(t) {
  currentType = t;
  document.querySelectorAll('.type-btn').forEach(b => {
    if (b.dataset.t === t) {
      b.className = 'type-btn flex-1 glass-btn-active text-xs py-2 rounded-lg';
    } else {
      b.className = 'type-btn flex-1 glass-btn text-xs py-2 rounded-lg';
    }
  });
  updateDownloadText();
}

function updateDownloadText() {
  const label = currentContentType === 'photo' ? '下载当前图片'
    : currentType === 'mp3' ? '下载 MP3 音频'
    : currentType === 'video' && currentContentType === 'photo' ? '下载视频'
    : '下载无水印视频';
  document.getElementById('downloadText').textContent = label;
}

function setQuality(q) {
  currentQuality = q;
  document.querySelectorAll('.quality-btn').forEach(b => {
    if (b.dataset.q === q) {
      b.className = 'quality-btn flex-1 glass-btn-active text-xs py-2 rounded-lg';
    } else {
      b.className = 'quality-btn flex-1 glass-btn text-xs py-2 rounded-lg';
    }
  });
  if (currentVideoUrl && currentContentType === 'video') {
    const player = document.getElementById('videoPlayer');
    const wasPlaying = !player.paused;
    player.src = '/api/stream?video_url=' + encodeURIComponent(currentVideoUrl) + '&quality=' + q;
    player.load();
    if (wasPlaying) player.play();
  }
}

function showPhoto(idx) {
  currentPhotoIdx = idx;
  document.getElementById('photoDisplay').src = currentImages[idx];
  const dots = document.querySelectorAll('#photoCounter button');
  dots.forEach((d, i) => {
    d.className = i === idx
      ? 'w-3.5 h-3.5 rounded-full bg-violet-400 shadow-lg shadow-violet-400/30'
      : 'w-3.5 h-3.5 rounded-full bg-white/20 hover:bg-white/35';
  });
}

// Result card entrance spring
const cardSpring = new Spring(0, { tension: 200, friction: 22, mass: 1 });
cardSpring.onUpdate(v => {
  const card = document.getElementById('resultCard');
  if (card && !card.classList.contains('hidden')) {
    card.style.transform = `translateY(${(1-v)*40}px)`;
    card.style.opacity = v;
  }
});

async function parseVideo() {
  const input = document.getElementById('urlInput');
  let text = input.value.trim();
  if (!text) return showToast('请输入视频链接', 'error');

  const urlMatch = text.match(/https?:\/\/\S+|v\.douyin\.com\/\S+|vm\.tiktok\.com\/\S+|vt\.tiktok\.com\/\S+/i);
  if (urlMatch) { text = urlMatch[0].replace(/[.,;:!?，。；：！？)]+$/, ''); }
  if (!text.startsWith('http://') && !text.startsWith('https://')) { text = 'https://' + text; }
  input.value = text;

  setParsing(true);
  currentUrl = text;

  try {
    const res = await fetch('/api/parse', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url: text }) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || '解析失败');

    const vc = document.getElementById('videoContainer');
    const pc = document.getElementById('photoContainer');
    const ph = document.getElementById('previewPlaceholder');
    const qs = document.getElementById('qualitySelector');
    const ts = document.getElementById('typeSelector');
    const dur = document.getElementById('duration');

    if (data.type === 'photo') {
      currentContentType = 'photo';
      currentImages = data.images || [];
      vc.classList.add('hidden'); pc.classList.remove('hidden'); ph.classList.add('hidden');
      qs.classList.add('hidden'); ts.classList.add('hidden'); dur.classList.add('hidden');
      currentVideoUrl = '';

      if (data.music_url) { ts.classList.remove('hidden'); setType('video'); }

      let dotsHtml = '';
      currentImages.forEach((_, i) => {
        dotsHtml += `<button onclick="showPhoto(${i})" data-spring class="w-3.5 h-3.5 rounded-full ${i === 0 ? 'bg-violet-400 shadow-lg shadow-violet-400/30' : 'bg-white/20 hover:bg-white/35'}"></button>`;
      });
      document.getElementById('photoCounter').innerHTML = dotsHtml;
      showPhoto(0);
      document.getElementById('platform').textContent = '抖音 · 图文';
    } else {
      currentContentType = 'video';
      currentVideoUrl = data.video_url;
      vc.classList.remove('hidden'); pc.classList.add('hidden'); ph.classList.add('hidden');
      qs.classList.remove('hidden'); ts.classList.remove('hidden'); dur.classList.remove('hidden');

      const player = document.getElementById('videoPlayer');
      player.poster = data.thumbnail;
      player.src = '/api/stream?video_url=' + encodeURIComponent(data.video_url) + '&quality=' + currentQuality;
      player.load();

      document.getElementById('platform').textContent = data.platform === 'tiktok' ? 'TikTok' : '抖音';
      document.getElementById('duration').textContent = formatDuration(data.duration);
      setQuality(currentQuality); setType('video');
    }

    document.getElementById('videoTitle').textContent = data.title;
    document.getElementById('resultCard').classList.remove('hidden');
    document.getElementById('downloadBtn').disabled = false;
    updateDownloadText();

    // Spring entrance
    cardSpring.setValue(0);
    cardSpring.setTarget(1);
  } catch (e) {
    showToast(e.message, 'error');
  } finally {
    setParsing(false);
  }
}

async function downloadCurrentPhoto() {
  if (!currentUrl) return showToast('请先解析图片', 'error');
  const btn = document.getElementById('downloadBtn'); btn.disabled = true;
  document.getElementById('downloadText').textContent = '下载中...';
  document.getElementById('downloadSpinner').classList.remove('hidden');
  try {
    const res = await fetch('/api/download', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url: currentUrl, type: 'video', image_index: currentPhotoIdx }) });
    if (!res.ok) { const d = await res.json(); throw new Error(d.detail || '下载失败'); }
    const blob = await res.blob();
    let filename = 'image.webp';
    const disp = res.headers.get('Content-Disposition') || '';
    const rfc = disp.match(/filename\*=(?:UTF-8|utf-8)''(.+?)(?:;|$)/i);
    if (rfc) filename = decodeURIComponent(rfc[1]);
    else { const m = disp.match(/filename="?(.+?)"?$/); if (m) filename = m[1]; }
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(a.href);
  } catch (e) { showToast(e.message || '下载失败', 'error'); }
  finally { btn.disabled = false; document.getElementById('downloadSpinner').classList.add('hidden'); document.getElementById('downloadText').textContent = '下载当前图片'; }
}

async function downloadVideo() {
  if (!currentUrl) return;
  if (currentContentType === 'photo') return downloadCurrentPhoto();
  const btn = document.getElementById('downloadBtn'); btn.disabled = true;
  document.getElementById('downloadText').textContent = '下载中...';
  document.getElementById('downloadSpinner').classList.remove('hidden');
  try {
    const res = await fetch('/api/download', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url: currentUrl, quality: currentQuality, type: currentType }) });
    if (!res.ok) { const d = await res.json(); throw new Error(d.detail || '下载失败'); }
    const blob = await res.blob();
    let filename = 'video.mp4';
    const disp = res.headers.get('Content-Disposition') || '';
    const rfc = disp.match(/filename\*=(?:UTF-8|utf-8)''(.+?)(?:;|$)/i);
    if (rfc) filename = decodeURIComponent(rfc[1]);
    else { const m = disp.match(/filename="?(.+?)"?$/); if (m) filename = m[1]; }
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(a.href);
    updateDownloadText();
  } catch (e) { showToast(e.message, 'error'); updateDownloadText(); }
  finally { btn.disabled = false; document.getElementById('downloadSpinner').classList.add('hidden'); }
}

function setParsing(loading) {
  const btn = document.getElementById('parseBtn');
  const input = document.getElementById('urlInput');
  const icon = document.getElementById('btnIcon');
  const text = document.getElementById('btnText');
  const spinner = document.getElementById('btnSpinner');
  btn.disabled = loading; input.disabled = loading;
  icon.classList.toggle('hidden', loading);
  text.textContent = loading ? '解析中' : '解析';
  spinner.classList.toggle('hidden', !loading);
}

function formatDuration(seconds) {
  if (!seconds) return '';
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m}:${String(s).padStart(2, '0')}`;
}

function showToast(message, type) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  const bg = type === 'error' ? 'border-red-500/30' : 'border-emerald-500/30';
  const text = type === 'error' ? 'text-red-300' : 'text-emerald-300';
  toast.className = `toast ${bg} ${text} text-sm px-4 py-2.5 rounded-xl`;
  toast.textContent = message;
  container.appendChild(toast);
  // Entrance spring
  toast.style.transform = 'translateY(-20px)'; toast.style.opacity = '0';
  requestAnimationFrame(() => { toast.style.transform = 'translateY(0)'; toast.style.opacity = '1'; });
  setTimeout(() => {
    toast.style.transition = 'all 0.3s ease-out';
    toast.style.opacity = '0'; toast.style.transform = 'translateY(-20px)';
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

document.getElementById('urlInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') parseVideo();
});

const videoPlayer = document.getElementById('videoPlayer');
const videoLoading = document.getElementById('videoLoading');
videoPlayer.addEventListener('waiting', () => videoLoading.classList.remove('hidden'));
videoPlayer.addEventListener('canplay', () => videoLoading.classList.add('hidden'));
videoPlayer.addEventListener('loadstart', () => videoLoading.classList.remove('hidden'));
videoPlayer.addEventListener('playing', () => videoLoading.classList.add('hidden'));
</script>
